name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Unsigned App
      run: |
        xcodebuild clean build \
          -project AfterFees.xcodeproj \
          -scheme AfterFees \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          IPHONEOS_DEPLOYMENT_TARGET=17.0 \
          CONFIGURATION_BUILD_DIR=build/Release-iphoneos

    - name: Package IPA
      run: |
        mkdir -p build/Payload
        cp -R build/Release-iphoneos/AfterFees.app build/Payload/
        cd build
        zip -qr AfterFees_unsigned.ipa Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AfterFees-Unsigned-IPA
        path: build/AfterFees_unsigned.ipa
